apiVersion: apps/v1
kind: Deployment
metadata:
  name: 2048-app
  labels:
    app: 2048
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: 2048
  strategy:
    type: RollingUpdate
    maxUnavailable: 1
    maxSurge: 1
  template:
    metadata:
      labels:
        app: 2048
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: 2048-container
          image: docker.io/username/2048:v2
          ports:
            - containerPort: 5000
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
            